<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TaskFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

body{
    margin:0;
    font-family: Inter, system-ui, sans-serif;
    background:#0e0e11;
    color:#e5e7eb;
}


/* ===== LAYOUT ===== */

.app{
    display:flex;
}


/* ===== SIDEBAR ===== */

.sidebar{
    width:240px;
    height:100vh;
    padding:20px;

    background:#111114;
    border-right:1px solid #1f1f23;

    position:fixed;
    left:0;
    top:0;

    transition:0.3s;
    z-index:1000;
}

.sidebar.collapsed{
    width:70px;
}

/* mobile hidden */
.sidebar.mobile-hidden{
    transform:translateX(-100%);
}

/* LOGO */

.logo{
    font-weight:600;
    margin-bottom:30px;
}

/* MENU */

.menu-section{
    margin-bottom:25px;
}

.menu-title{
    font-size:11px;
    color:#6b7280;
    margin-bottom:8px;
}

/* LINKS */

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;

    padding:10px 12px;
    border-radius:8px;

    color:#d1d5db;
    text-decoration:none;
    transition:0.2s;
}

.sidebar a:hover{
    background:#1a1a1f;
}

.sidebar a.active{
    background:#1a1a1f;
    border:1px solid #2a2a30;
}

/* hide text */

.sidebar.collapsed span,
.sidebar.collapsed .menu-title,
.sidebar.collapsed .user-box{
    display:none;
}

.sidebar.collapsed a{
    justify-content:center;
}


/* ===== MAIN ===== */

.main{
    flex:1;
    margin-left:240px;
    transition:0.3s;
}

.main.full{
    margin-left:70px;
}


/* ===== TOPBAR ===== */

.topbar{
    height:56px;
    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

    border-bottom:1px solid #1f1f23;
    background:#0e0e11;
}

.menu-btn{
    background:none;
    border:1px solid #2a2a30;
    color:white;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.menu-btn:hover{
    background:#1a1a1f;
}


/* ===== CONTENT ===== */

.content{
    padding:25px;
}

/* BLOCK */

.block{
    background:#111114;
    border:1px solid #1f1f23;
    border-radius:12px;
    padding:20px;
}


/* ===== WELCOME ===== */

.welcome{
    padding:30px;
    border-radius:14px;
    border:1px solid #1f1f23;
    background:linear-gradient(180deg,#15151a,#111114);
    margin-bottom:20px;
}


/* ===== STATS ===== */

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.stat{
    padding:15px;
    border-radius:10px;
    border:1px solid #1f1f23;
    background:#111114;
}

.stat-number{
    font-size:20px;
    font-weight:600;
}


/* ===== BUTTON ===== */

.btn{
    border-radius:8px;
}

.btn-danger{
    background:#1a0f0f;
    border:1px solid #3a1f1f;
}

.btn-danger:hover{
    background:#2a1414;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">🚀 TaskFlow</div>

<div class="menu-section">
<div class="menu-title">Задачи</div>

<a href="{% url 'task_list' %}" class="{% if request.path == '/' %}active{% endif %}">
📋 <span>Все задачи</span>
</a>

<a href="{% url 'task_create' %}" class="{% if 'create' in request.path %}active{% endif %}">
➕ <span>Создать</span>
</a>
</div>

{% if user.is_staff %}
<div class="menu-section">
<div class="menu-title">Админ</div>

<a href="{% url 'user_list' %}" class="{% if 'users' in request.path %}active{% endif %}">
👥 <span>Пользователи</span>
</a>
</div>
{% endif %}

<div class="menu-section">

<div class="menu-title">Аккаунт</div>

<div class="user-box">👤 {{ user.username }}</div>

<form method="post" action="{% url 'logout' %}">
{% csrf_token %}
<button class="btn btn-danger w-100 mt-2">Выйти</button>
</form>

</div>

</div>


<!-- MAIN -->

<div class="main" id="main">

<!-- TOPBAR -->

<div class="topbar">

<button id="toggleSidebar" class="menu-btn">☰</button>

<div>Task Manager</div>

</div>


<!-- CONTENT -->

<div class="content">

{% block content %}
{% endblock %}

</div>

</div>

</div>


<script>

const btn = document.getElementById("toggleSidebar");
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");

btn.onclick = () => {

    // desktop collapse
    if(window.innerWidth > 768){
        sidebar.classList.toggle("collapsed");
        main.classList.toggle("full");
    }

    // mobile slide
    else{
        sidebar.classList.toggle("mobile-hidden");
    }
};

</script>

</body>
</html>
