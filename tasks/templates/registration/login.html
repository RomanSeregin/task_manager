<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход | TaskFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family: Inter, system-ui, sans-serif;
    background:#0e0e11;
    color:#e5e7eb;

    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* ===== CARD ===== */
.auth-box{
    width:100%;
    max-width:400px;

    background: rgba(255,255,255,0.05);
    border:1px solid #1f1f23;
    border-radius:16px;

    padding:30px;

    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* ===== TITLE ===== */
.auth-title{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

/* ===== INPUTS ===== */
input{
    background: rgba(255,255,255,0.05) !important;
    color:#e5e7eb !important;
    border:1px solid #333 !important;
    border-radius:8px !important;
}

input:focus{
    border-color:#4facfe !important;
    box-shadow:0 0 10px rgba(79,172,254,0.6) !important;
}

/* placeholder */
input::placeholder{
    color:#999 !important;
}

/* ===== BUTTON ===== */
.btn-primary{
    width:100%;
    border-radius:8px;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    border:none;
}

.btn-primary:hover{
    opacity:0.9;
}

/* ===== LINK ===== */
.auth-link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.auth-link a{
    color:#4facfe;
    text-decoration:none;
}

.auth-link a:hover{
    text-decoration:underline;
}

/* ===== ALERTS ===== */
.alert{
    background: rgba(30,30,35,0.8);
    border:1px solid #444;
    color:#e5e7eb;
}

</style>

</head>

<body>

<div class="auth-box">

    <div class="auth-title">
        🚀 TaskFlow
        <div style="font-size:14px; color:#9ca3af;">Вход в аккаунт</div>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary mt-2">
            Войти
        </button>
    </form>

    <div class="auth-link">
        Нет аккаунта? <a href="/register/">Регистрация</a>
    </div>

</div>

</body>
</html>
